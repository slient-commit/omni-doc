services:
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: omni-doc-onlyoffice
    restart: unless-stopped
    environment:
      # ponytail: JWT secret shared with omni-doc API to sign editor tokens
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET}
      JWT_HEADER: Authorization
      JWT_IN_BODY: "true"
    ports:
      - "8443:443"
      - "8088:80"
    volumes:
      - onlyoffice-data:/var/www/onlyoffice/Data
      - onlyoffice-logs:/var/log/onlyoffice
    networks:
      - dokploy-network

volumes:
  onlyoffice-data:
  onlyoffice-logs:

networks:
  dokploy-network:
    external: true
