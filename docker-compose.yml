services:
  omni-doc-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: omni-doc-api
    container_name: omni-doc-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # External MySQL connection string (required). To reach a MySQL running
      # on the host machine, use host.docker.internal:
      #   mysql://user:pass@host.docker.internal:3306/omni_doc
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-onboarding@resend.dev}
      APP_URL: ${APP_URL:-http://localhost:8080}
    env_file:
      - .env
    networks:
      - dokploy-network

  omni-doc-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: omni-doc-app
    container_name: omni-doc-app
    restart: unless-stopped
    depends_on:
      - omni-doc-api
    ports:
      # host:container — nginx serves the app and proxies /api to omni-doc-api
      - "8080:80"
    networks:
      - dokploy-network

networks:
  # Created by Dokploy on the host; its Traefik proxy routes to containers on it.
  dokploy-network:
    external: true
