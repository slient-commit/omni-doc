services:
  omni-doc-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: omni-doc-api
    container_name: omni-doc-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    networks:
      - dokploy-network

  omni-doc-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: omni-doc-app
    container_name: omni-doc-app
    restart: unless-stopped
    depends_on:
      - omni-doc-api
    ports:
      # host:container — nginx serves the app and proxies /api to omni-doc-api
      - "8080:80"
    networks:
      - dokploy-network

networks:
  # Created by Dokploy on the host; its Traefik proxy routes to containers on it.
  dokploy-network:
    external: true
